name: Keep Render Backend Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (sleeps after 15m)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Pinging Sinyalci Backend..."
          curl -s --max-time 15 https://sinyalci-backend.onrender.com/health || echo "Ping timeout, but request sent."
