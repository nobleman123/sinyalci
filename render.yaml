services:
  # ── Backend (Web + Inline Workers) ───────────────────────────────────────
  # FIX: Worker servisi kaldırıldı. Tüm cron job'lar server.ts içinde
  #      başlatılıyor. Ücretsiz planda iki ayrı servis yerine tek servis
  #      çalıştırıldığında keep-alive + worker birlikte sağlıklı çalışır.
  - type: web
    name: sinyalci-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: npm run start:web
    region: frankfurt
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sinyalci-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sinyalci-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: "super_secret_jwt_key_for_sinyalci_123!"
      - key: VAPID_PUBLIC_KEY
        value: "BLh3lNsf8SGAJt1-3HgpN4JJxkwkeuHEu2ym83C5SQJndOG0GXMLkeZxbDVunwY9Mu4C3MJsJafz_dIbwVztAug"
      - key: VAPID_PRIVATE_KEY
        value: "GsPQXn3ORqCmM7TD5Hi7WZnzMqjo4ynOmvhKdIYvkT4"
      - key: VAPID_SUBJECT
        value: "mailto:admin@nexus-signal.app"
      # FIX: FRONTEND_ORIGIN artık Render frontend URL'ini gösteriyor
      - key: FRONTEND_ORIGIN
        value: "https://sinyalci-frontend.onrender.com"

  # ── Frontend (Static) ─────────────────────────────────────────────────────
  - type: web
    name: sinyalci-frontend
    env: static
    staticPublishPath: ./frontend
    domains:
      - sinyalci.com
      - www.sinyalci.com

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: sinyalci-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everyone

databases:
  - name: sinyalci-db
    databaseName: sinyalci
    user: sinyalci_user
    region: frankfurt
    plan: free
